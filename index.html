<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>दैनिक काम-कारवाही अभिलेख फारम</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 650px; background: #fff; padding: 30px; margin: 0 auto; border-radius: 8px; border-top: 6px solid #1a365d; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #1a365d; padding-bottom: 15px; }
        .header h2 { color: #1a365d; margin: 5px 0; font-size: 22px; }
        .header h3 { color: #2d3748; margin: 5px 0; font-size: 19px; }
        .header p { color: #4a5568; margin: 5px 0; font-size: 16px; font-weight: bold; }
        
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        .date-group { display: flex; gap: 5px; margin-top: 6px; }
        
        label { display: block; margin-top: 14px; font-weight: bold; color: #2d3748; font-size: 14px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; margin: 6px 0 10px 0; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 14px; }
        
        .activity-section { background: #f7fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 8px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #4a5568; cursor: pointer; }
        
        .btn { background: #1a365d; color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; border-radius: 4px; margin-top: 20px; }
        .btn:hover { background: #2a4365; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2>काठमाडौं उपत्यका प्रहरी</h2>
        <h3>सशस्त्र प्रहरी गण नं. २ महाराजगंज, काठमाडौं</h3>
        <p>प्रहरी कर्मचारीहरुको दैनिक काम-कारवाही तथा परिचालन अभिलेख फारम</p>
    </div>

    <form action="https://script.google.com/macros/s/AKfycbyS1mPzGd0g0IHIfTyWdFRSNHhYtSlzANPDBDaXpbW1oWBmoyA-QzrV1k_z8aK_6xuY/exec" method="POST">
        
        <div class="row">
            <div class="col" style="flex: 1.5;">
                <label>१. मिति (नेपालीमा) *</label>
                <div class="date-group">
                    <select name="nepali_year" required>
                        <option value="२०८३">२०८३</option>
                    </select>
                    <select name="nepali_month" required>
                        <option value="">महिना</option>
                        <option value="०१">बैशाख</option><option value="०२">जेठ</option><option value="०३">असार</option>
                        <option value="०४">साउन</option><option value="०५">भदौ</option><option value="०६">असोज</option>
                        <option value="०७">कात्तिक</option><option value="०८">मंसिर</option><option value="०९">पुस</option>
                        <option value="१०">माघ</option><option value="११">फागुन</option><option value="१२">चैत</option>
                    </select>
                    <select name="nepali_gate" required>
                        <option value="">गते</option>
                        <script>
                            const nepaliDigits = ["०", "१", "२", "३", "४", "५", "६", "७", "८", "९"];
                            for(let i = 1; i <= 32; i++) {
                                let str = i.toString();
                                let nepaliNum = "";
                                for(let char of str) { nepaliNum += nepaliDigits[parseInt(char)]; }
                                document.write(`<option value="${i.toString().padStart(2, '0')}">${nepaliNum}</option>`);
                            }
                        </script>
                    </select>
                </div>
            </div>
            <div class="col" style="flex: 1;">
                <label>२. हप्ता (बार) *</label>
                <select name="shift" required>
                    <option value="">-- बार --</option>
                    <option value="आइतबार">आइतबार</option><option value="सोमबार">सोमबार</option>
                    <option value="मंगलबार">मंगलबार</option><option value="बुधबार">बुधबार</option>
                    <option value="बिहीबार">बिहीबार</option><option value="शुक्रबार">शुक्रबार</option>
                    <option value="शनिबार">शनिबार</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>३. प्रहरी कर्मचारीको दर्जा *</label>
                <select name="rank_name" id="rankSelect" onchange="filterNames()" required>
                    <option value="">-- दर्जा छान्नुहोस् --</option>
                    <option value="प्र.ब.ना.नि.">प्र.ब.ना.नि.</option>
                    <option value="प्र.ना.नि.">प्र.ना.नि.</option>
                    <option value="प्र.स.नि.">प्र.स.नि.</option>
                    <option value="प्र.ब.ह.">प्र.ब.ह.</option>
                    <option value="प्र.ह.">प्र.ह.</option>
                    <option value="प्र.स.ह.">प्र.स.ह.</option>
                    <option value="प्र.ज.">प्र.ज.</option>
                    <option value="प्र.का.स.">प्र.का.स.</option>
                </select>
            </div>
            <div class="col">
                <label>४. कर्मचारीको पुरा नाम *</label>
                <select name="batch_team" id="nameSelect" required>
                    <option value="">-- पहिले दर्जा छान्नुहोस् --</option>
                </select>
            </div>
        </div>

        <label>५. कार्यको विवरण (टिक लगाउनुहोस्) *</label>
        <div class="activity-section">
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="बिहानको पिटी"> बिहानको पिटी</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="चेक रोलक"> चेक रोलक</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="परेड"> परेड</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="फटिक"> फटिक</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="ड्यूटी"> ड्यूटी</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="कार्यालय"> कार्यालय</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="विदा"> विदा</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="विरामी"> विरामी</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="आउट"> OUT</label>
                <label class="checkbox-item"><input type="checkbox" name="duty_type" value="अन्य"> अन्य</label>
            </div>
        </div>

        <label>६. कार्य सम्पादन सम्बन्धी थप विस्तृत विवरण</label>
        <textarea name="achievements" rows="3" placeholder="थप विवरण यहाँ खुलाउनुहोस्..."></textarea>

        <label>७. कैफियत</label>
        <input type="text" name="remarks" placeholder="कैफियत भए लेख्नुहोस्">

        <button type="submit" class="btn">सेभ गर्नुहोस</button>
    </form>
</div>

function filterNames() {
    const rankSelect = document.getElementById("rankSelect");
    const nameSelect = document.getElementById("nameSelect");
    const selectedRank = rankSelect.value;
    
    nameSelect.innerHTML = '<option value="">-- नाम छान्नुहोस् --</option>';
    
    if (selectedRank && staffData[selectedRank]) {
        staffData[selectedRank].forEach(function(name) {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            nameSelect.appendChild(option);
        });
    } else {
        nameSelect.innerHTML = '<option value="">-- पहिले दर्जा छान्नुहोस् --</option>';
    }
}

document.getElementById("myForm").addEventListener("submit", function(e) {

    // चेकबक्सहरू छान्ने
    let checkboxes = document.querySelectorAll('input[name="duty_type"]:checked');
    let values = [];
    checkboxes.forEach((cb) => { values.push(cb.value); });
    
    // डाटा तयार पार्ने
    let formData = new FormData(form);
